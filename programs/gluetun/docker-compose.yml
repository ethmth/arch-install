services:
  gluetun-home:
    image: qmcgaw/gluetun
    cap_add:
      - NET_ADMIN
    environment:
      - VPN_SERVICE_PROVIDER=custom
      - VPN_TYPE=wireguard
      - HTTPPROXY=on
      - SHADOWSOCKS=on
    ports:
      - 8880:8888/tcp # HTTP proxy
      - 8388:8388/tcp # Shadowsocks
      - 8388:8388/udp # Shadowsocks
    volumes:
      - ./wg0.conf:/gluetun/wireguard/wg0.conf
    restart: unless-stopped
