version: '3.9'
services:
  label-studio:
    stdin_open: true
    tty: true
    image: heartexlabs/label-studio:latest
    ports:
      - 8085:8080
    volumes:
      - ./mydata:/label-studio/data:rw
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: label-studio start --username admin@admin.com --password password