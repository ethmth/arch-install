version: "3"

services:
  sd-webui:
    build:
      context: .
    container_name: stable-diffusion
    volumes:
      - ./stable-diffusion-webui:/home/user/stable-diffusion-webui
      - ./stable-diffusion-webui:/home/user/stable-diffusion-webui
    ports:
      - "7860:7860"
    deploy:
      resources:
        reservations:
          devices:
              - driver: nvidia
                device_ids: ['0']
                capabilities: [compute, utility]
    restart: no
