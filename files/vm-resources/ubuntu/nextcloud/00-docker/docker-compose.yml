services:
  mount-checker:
    build: mount-checker
    container_name: nextcloud-checker
    volumes:
      - /media:/media:ro
    healthcheck:
      test: ["CMD-SHELL", "[ -d /media/veracrypt1 ]"]
      interval: 1s
      timeout: 1s
      start_period: 0s
      retries: 2147483647
    restart: unless-stopped

  mount-runner:
    build: mount-runner
    container_name: nextcloud-runner
    depends_on:
      mount-checker:
        condition: service_healthy
    volumes:
      - /media/veracrypt1:/media/veracrypt1:ro
    restart: on-failure
  
  db:
    image: mariadb:10.6
    container_name: nextcloud-db
    depends_on:
      mount-checker:
        condition: service_healthy
    command: --transaction-isolation=READ-COMMITTED --log-bin=binlog --binlog-format=ROW
    volumes:
      - ./db:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=password
      - MYSQL_PASSWORD=password
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
    restart: on-failure

  redis:
    image: redis:alpine
    container_name: nextcloud-redis
    depends_on:
      mount-checker:
        condition: service_healthy
    restart: on-failure

  app:
    build: .
    container_name: nextcloud-app
    depends_on:
      mount-checker:
        condition: service_healthy
    links:
      - db
      - redis
    volumes:
      - ./nextcloud:/var/www/html
      - /media/veracrypt1:/opt/mount
    environment:
      - MYSQL_PASSWORD=password
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_HOST=db
      - REDIS_HOST=redis
      - NEXTCLOUD_ADMIN_USER=admin
      - NEXTCLOUD_ADMIN_PASSWORD=admin
      - NEXTCLOUD_INIT_HTACCESS=true
      - NEXTCLOUD_TRUSTED_DOMAINS="localhost 10.152.152.14 10.152.153.14"
      - PHP_MEMORY_LIMIT=12G
      - PHP_UPLOAD_LIMIT=15G
      - APACHE_BODY_LIMIT=0
    restart: on-failure
  
  web:
    build: ./web
    container_name: nextcloud-web
    depends_on:
      mount-checker:
        condition: service_healthy
    ports:
      - 8080:80
    links:
      - app
    volumes:
      - ./nextcloud:/var/www/html:ro
    restart: on-failure

